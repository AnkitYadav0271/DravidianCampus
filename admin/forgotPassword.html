<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Dravidian Campus</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center pt-28 pb-12 px-4">
    
    <div id="navbar" class="bg-[#FAEED4]/80 backdrop-blur-lg border border-white/10 shadow mb-0 fixed top-0 z-50 w-full">
        <nav class="w-[95%] md:w-[90%] lg:w-4/5 mx-auto">
            <div class="flex items-center justify-between py-3">
                <div class="flex items-center gap-2">
                    <img src="/public/dravidian-campus-logo.png" alt="Dravidian Campus Logo"
                        class="w-8 h-8 md:w-10 md:h-10 lg:w-12 lg:h-12 rounded object-contain cursor-pointer">
                    <h3 class="font-bold text-sm md:text-lg lg:text-xl cursor-pointer">
                        Dravidian Campus
                    </h3>
                </div>
                <button id="menuBtn" class="md:hidden text-3xl font-bold cursor-pointer select-none">☰</button>
            </div>
        </nav>
    </div>

    <div class="bg-white w-full max-w-[900px] rounded-[24px] p-6 grid grid-cols-1 md:grid-cols-[1fr_1.2fr] gap-10 shadow-[0_20px_40px_rgba(0,0,0,0.15)] mx-auto">

        <div class="bg-zinc-950 rounded-[16px] relative overflow-hidden flex flex-col justify-between p-10 min-h-[240px] md:min-h-[460px]">
            <h2 id="banner-text" class="text-white text-2xl md:text-[2.25rem] font-medium leading-snug z-10 max-w-[90%]">
                Reset your credentials.
            </h2>
            <p class="text-zinc-400 text-xs z-10 tracking-wide uppercase">Dravidian Campus Account Recovery</p>

            <div class="absolute bottom-[-10%] left-0 right-0 h-[60%] bg-gradient-to-t from-orange-600 via-amber-500 to-transparent opacity-80 blur-[25px] z-0 pointer-events-none"
                style="mask-image: linear-gradient(to top, black 30%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);">
            </div>
        </div>

        <div class="flex items-center md:pr-5">
            <div class="w-full">
                
                <div class="flex items-center gap-2 mb-4">
                    <div id="dot-1" class="w-2 h-2 rounded-full bg-orange-600 transition-all duration-300"></div>
                    <div id="dot-2" class="w-2 h-2 rounded-full bg-zinc-200 transition-all duration-300"></div>
                    <div id="dot-3" class="w-2 h-2 rounded-full bg-zinc-200 transition-all duration-300"></div>
                </div>

                <h1 id="step-title" class="text-zinc-900 text-[1.75rem] font-semibold mb-1">Account Recovery</h1>
                <p id="step-subtitle" class="text-zinc-500 text-sm mb-6">Enter your registered administrator email address to begin.</p>

                <hr class="border-0 border-t border-zinc-100 mb-6">

                <form id="step1-form" class="space-y-5">
                    <div class="flex flex-col">
                        <label for="recovery-email" class="text-xs font-medium text-zinc-500 mb-2">Admin Email ID</label>
                        <input type="email" id="recovery-email" placeholder="admin@dravidiancampus.com" required
                            class="w-full px-4 py-3 border border-zinc-200 rounded-lg text-[0.95rem] text-zinc-900 outline-none focus:border-orange-600 focus:ring-1 focus:ring-orange-600">
                    </div>
                    <button type="submit" id="btn-step1" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3.5 rounded-lg font-medium transition cursor-pointer">
                        Send Verification Code
                    </button>
                </form>

                <form id="step2-form" class="space-y-5 hidden">
                    <div class="flex flex-col">
                        <label for="otp-code" class="text-xs font-medium text-zinc-500 mb-2">Enter 6-Digit Code</label>
                        <input type="text" id="otp-code" placeholder="••••••" maxlength="6" pattern="\d{6}" required
                            class="w-full px-4 py-3 border border-zinc-200 rounded-lg text-center tracking-[0.5em] text-lg font-semibold text-zinc-900 outline-none focus:border-orange-600 focus:ring-1 focus:ring-orange-600">
                    </div>
                    <button type="submit" id="btn-step2" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3.5 rounded-lg font-medium transition cursor-pointer">
                        Verify Code
                    </button>
                    <p class="text-center text-xs text-zinc-400">Didn't get code? <span id="resend-otp" class="text-orange-600 cursor-pointer hover:underline">Resend</span></p>
                </form>

                <form id="step3-form" class="space-y-5 hidden">
                    <div class="flex flex-col relative">
                        <label for="new-password" class="text-xs font-medium text-zinc-500 mb-2">New Security Password</label>
                        <div class="relative w-full flex items-center">
                            <input type="password" id="new-password" placeholder="••••••••••••" required
                                class="w-full pl-4 pr-12 py-3 border border-zinc-200 rounded-lg text-[0.95rem] text-zinc-900 outline-none focus:border-orange-600 focus:ring-1 focus:ring-orange-600">
                            <button type="button" id="toggleNewPasswordBtn" class="absolute right-3 text-zinc-400 hover:text-zinc-600 cursor-pointer">
                                <span class="material-symbols-outlined text-[22px]">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label for="confirm-password" class="text-xs font-medium text-zinc-500 mb-2">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="••••••••••••" required
                            class="w-full px-4 py-3 border border-zinc-200 rounded-lg text-[0.95rem] text-zinc-900 outline-none focus:border-orange-600 focus:ring-1 focus:ring-orange-600">
                    </div>
                    <button type="submit" id="btn-step3" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3.5 rounded-lg font-medium transition cursor-pointer">
                        Update Password & Log In
                    </button>
                </form>

                <p id="ui-message" class="text-xs font-medium mt-4 hidden"></p>

                <div class="text-center mt-6">
                    <a href="/adminLogin.html" class="text-xs text-zinc-500 hover:text-orange-600 transition underline flex items-center justify-center gap-1">
                        <span class="material-symbols-outlined text-sm">arrow_back</span> Back to login
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/forgotPassword.js" defer></script>
    <script src="../index.js"></script>
</body>
</html>
