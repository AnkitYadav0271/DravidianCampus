<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Dravidian Campus</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center pt-28 pb-12 px-4">

    <div id="navbar"
        class="bg-[#FAEED4]/80 backdrop-blur-lg border border-white/10 shadow mb-0 fixed top-0 z-50 w-full">
        <nav class="w-[95%] md:w-[90%] lg:w-4/5 mx-auto">
            <div class="flex items-center justify-between py-3">
                <div class="flex items-center gap-2">
                    <img src="/public/dravidian-campus-logo.png" alt="Dravidian Campus Logo"
                        class="w-8 h-8 md:w-10 md:h-10 lg:w-12 lg:h-12 rounded object-contain cursor-pointer">
                    <h3 class="font-bold text-sm md:text-lg lg:text-xl cursor-pointer">
                        Dravidian Campus
                    </h3>
                </div>

                <div class="hidden md:flex items-center gap-4 lg:gap-8">
                    <a href="/index.html"
                        class="text-sm md:text-base lg:text-lg hover:text-orange-400 transition duration-300">Home</a>
                    <a href="/courses.html"
                        class="text-sm md:text-base lg:text-lg hover:text-orange-400 transition duration-300">Courses</a>
                    <a href="/library.html"
                        class="text-sm md:text-base lg:text-lg hover:text-orange-400 transition duration-300">Library</a>
                    <a href="/computer-course.html"
                        class="text-sm md:text-base lg:text-lg hover:text-orange-400 transition duration-300">Computer
                        Course</a>
                    <button
                        class="bg-[#251901] text-white px-4 py-2 rounded hover:bg-orange-400 transition duration-300 cursor-pointer">
                        <a href="/join-now.html">Join Now</a>
                    </button>
                </div>

                <button id="menuBtn" class="md:hidden text-3xl font-bold cursor-pointer select-none">
                    ☰
                </button>
            </div>
        </nav>

        <div id="mobileMenu" class="hidden flex-col border-t border-gray-300 bg-[#FAEED4]">
            <a href="/" class="block p-4 hover:bg-orange-400">Home</a>
            <a href="/courses.html" class="block p-4 hover:bg-orange-400">Courses</a>
            <a href="/library.html" class="block p-4 hover:bg-orange-400">Library</a>
            <a href="/computer-course.html" class="block p-4 hover:bg-orange-400">Computer Course</a>
            <div class="p-4">
                <button class="w-full bg-black text-white py-2 rounded hover:bg-emerald-600 transition">
                    <a href="join-now.html">Join Now</a>
                </button>
            </div>
        </div>
    </div>
    <div
        class="bg-white w-full max-w-[900px] rounded-[24px] p-6 grid grid-cols-1 md:grid-cols-[1fr_1.2fr] gap-10 shadow-[0_20px_40px_rgba(0,0,0,0.15)] mx-auto">

        <div
            class="bg-zinc-950 rounded-[16px] relative overflow-hidden flex flex-col justify-between p-10 min-h-[240px] md:min-h-[460px]">
            <h2 class="text-white text-2xl md:text-[2.25rem] font-medium leading-snug z-10 max-w-[90%]">
                Login as Admin.
            </h2>
            <p class="text-zinc-400 text-xs z-10 tracking-wide uppercase">Dravidian Campus Management</p>

            <div class="absolute bottom-[-10%] left-0 right-0 h-[60%] bg-gradient-to-t from-orange-600 via-amber-500 to-transparent opacity-80 blur-[25px] z-0 pointer-events-none"
                style="mask-image: linear-gradient(to top, black 30%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);">
            </div>
        </div>

        <div class="flex items-center md:pr-5">
            <div class="w-full">
                <div class="mb-6">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2V6M12 18V22M4.22 4.22L7.05 7.05M16.95 16.95L19.78 19.78M2 12H6M18 12H22M4.22 19.78L7.05 16.95M16.95 7.05L19.78 4.22"
                            class="stroke-orange-600" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>

                <h1 class="text-zinc-900 text-[2rem] font-semibold mb-2">Admin Portal</h1>
                <p class="text-zinc-500 text-sm mb-6">Sign in to access your administrative control board.</p>

                <hr class="border-0 border-t border-zinc-100 mb-8">

                <form id="auth-form">
                    <div class="flex flex-col mb-5">
                        <label for="email" class="text-xs font-medium text-zinc-500 mb-2">Admin Email ID</label>
                        <input type="email" id="email" placeholder="admin@dravidiancampus.com" required
                            class="w-full px-4 py-3 border border-zinc-200 rounded-lg text-[0.95rem] text-zinc-900 outline-none transition duration-200 focus:border-orange-600 focus:ring-1 focus:ring-orange-600">
                    </div>

                    <div class="flex flex-col mb-6">
                        <div class="flex justify-between items-center mb-2">
                            <label for="password" class="text-xs font-medium text-zinc-500">Security Password</label>
                            <a href="./forgotPassword.html" class="text-xs text-orange-600 hover:underline">Forgot
                                password?</a>
                        </div>

                        <div class="relative w-full flex items-center">
                            <input type="password" id="password" placeholder="••••••••••••" required
                                class="w-full pl-4 pr-12 py-3 border border-zinc-200 rounded-lg text-[0.95rem] text-zinc-900 outline-none transition duration-200 focus:border-orange-600 focus:ring-1 focus:ring-orange-600">

                            <button type="button" id="togglePasswordBtn"
                                class="absolute right-3 text-zinc-400 hover:text-zinc-600 select-none cursor-pointer flex items-center justify-center">
                                <span class="material-symbols-outlined text-[22px]">visibility</span>
                            </button>
                        </div>
                    </div>

                    <p id="error-message" class="text-red-600 text-xs font-medium mb-3 hidden"></p>

                    <button type="submit" id="submit-btn"
                        class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3.5 rounded-lg text-base font-medium mt-2 transition duration-200 cursor-pointer">
                        Secure Sign In
                    </button>
                </form>

                <p class="text-center mt-6 text-xs text-zinc-400">
                    Authorized Personnel Access Only. Unauthorized attempts are monitored.
                </p>
            </div>
        </div>
    </div>

    <script src="../js/adminLogin.js"></script>
    <script src="/index.js"></script>
</body>

</html>
